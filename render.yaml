services:
  # ── Web dashboard ─────────────────────────────────────────
  - type: web
    name: btc-strength-dashboard
    runtime: python
    buildCommand: pip install -r requirements-prod.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn btc_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: btc_project.settings
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: TIME_ZONE
        value: Africa/Dar_es_Salaam
      - key: DATABASE_URL
        fromDatabase:
          name: btc-bot-db
          property: connectionString

  # ── Bot worker (24/7 scanner) ─────────────────────────────
  - type: worker
    name: btc-strength-bot
    runtime: python
    buildCommand: pip install -r requirements-prod.txt && python manage.py migrate --noinput
    startCommand: python manage.py runbot
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: btc_project.settings
      - key: DEBUG
        value: "False"
      - key: TIME_ZONE
        value: Africa/Dar_es_Salaam
      - key: WHATSAPP_NUMBER
        sync: false
      - key: WHAPI_TOKEN
        sync: false
      - key: CRYPTOPANIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: btc-bot-db
          property: connectionString

databases:
  - name: btc-bot-db
    plan: free